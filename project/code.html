<h1>Bat Ball Stump Game</h1>

<button onclick="
let randomNumber = Math.random() * 3;
let computerChoice;

if (randomNumber <= 1) {
    computerChoice = 'Bat';
} else if (randomNumber <= 2) {
    computerChoice = 'Ball';
} else {
    computerChoice = 'Stump';
}

let resultMsg;

if (computerChoice === 'Ball') {
    resultMsg = 'User won';
} else if (computerChoice === 'Bat') {
    resultMsg = 'It\\'s a tie';
} else {
    resultMsg = 'Computer won';
}

alert(`You chose Bat. Computer chose ${computerChoice}. ${resultMsg}`);
">Bat</button>
